<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DayTrack - 工作日志</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
    }

    .app {
      display: flex;
      width: 100%;
      height: 100vh;
      background: #fff;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .sidebar {
      width: 280px;
      background: #f8f9fa;
      border-right: 1px solid #e9ecef;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 24px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .sidebar-header h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .sidebar-header p {
      font-size: 13px;
      opacity: 0.9;
    }

    .report-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 0;
    }

    .report-item {
      padding: 12px 20px;
      cursor: pointer;
      transition: all 0.2s;
      border-left: 3px solid transparent;
    }

    .report-item:hover {
      background: #e9ecef;
    }

    .report-item.active {
      background: #e7f3ff;
      border-left-color: #667eea;
    }

    .report-date {
      font-weight: 600;
      color: #212529;
      font-size: 14px;
    }

    .report-status {
      font-size: 12px;
      color: #6c757d;
      margin-top: 4px;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .main-header {
      padding: 20px 32px;
      border-bottom: 1px solid #e9ecef;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #fff;
    }

    .main-header h2 {
      font-size: 22px;
      color: #212529;
    }

    .actions {
      display: flex;
      gap: 12px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: #f8f9fa;
      color: #495057;
      border: 1px solid #dee2e6;
    }

    .btn-secondary:hover {
      background: #e9ecef;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
    }

    .report-content {
      max-width: 900px;
      margin: 0 auto;
    }

    .report-text {
      white-space: pre-wrap;
      line-height: 1.8;
      color: #212529;
      font-size: 15px;
      background: #f8f9fa;
      padding: 24px;
      border-radius: 12px;
      border: 1px solid #e9ecef;
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: #6c757d;
    }

    .empty-state h3 {
      font-size: 20px;
      margin-bottom: 12px;
      color: #495057;
    }

    .empty-state p {
      font-size: 14px;
    }

    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #ffffff;
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="sidebar">
      <div class="sidebar-header">
        <h1>DayTrack</h1>
        <p>自动化工作日志</p>
      </div>
      <div class="report-list" id="reportList">
        <div class="empty-state">
          <p>加载日报列表...</p>
        </div>
      </div>
    </div>
    <div class="main">
      <div class="main-header">
        <h2 id="currentDate">选择一个日期查看日报</h2>
        <div class="actions">
          <button class="btn btn-primary" id="regenerateBtn" disabled>
            重新生成
          </button>
        </div>
      </div>
      <div class="content" id="content">
        <div class="empty-state">
          <h3>欢迎使用 DayTrack</h3>
          <p>请从左侧选择一个日期查看或生成日报</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentDate = null;
    let reports = [];

    async function fetchReports() {
      const response = await fetch('/api/reports?limit=30');
      reports = await response.json();
      renderReportList();
    }

    function renderReportList() {
      const list = document.getElementById('reportList');
      
      if (reports.length === 0) {
        list.innerHTML = '<div class="empty-state"><p>暂无日报记录</p></div>';
        return;
      }

      list.innerHTML = reports.map(report => `
        <div class="report-item ${currentDate === report.date ? 'active' : ''}" 
             onclick="selectDate('${report.date}')">
          <div class="report-date">${formatDate(report.date)}</div>
          <div class="report-status">
            ${report.editedContent ? '✏️ 已编辑' : report.generatedContent ? '✅ 已生成' : '⏳ 待生成'}
          </div>
        </div>
      `).join('');
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr + 'T00:00:00');
      const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' };
      return date.toLocaleDateString('zh-CN', options);
    }

    async function selectDate(date) {
      currentDate = date;
      document.getElementById('currentDate').textContent = formatDate(date);
      document.getElementById('regenerateBtn').disabled = false;
      renderReportList();
      
      await loadReport(date);
    }

    async function loadReport(date) {
      const content = document.getElementById('content');
      content.innerHTML = '<div class="empty-state"><p>加载中...</p></div>';

      try {
        let response = await fetch(`/api/reports/${date}`);
        
        if (response.status === 404) {
          content.innerHTML = `
            <div class="empty-state">
              <h3>该日期暂无日报</h3>
              <p>点击"重新生成"按钮来生成日报</p>
            </div>
          `;
          return;
        }

        const report = await response.json();
        const text = report.editedContent || report.generatedContent;
        
        if (text) {
          content.innerHTML = `
            <div class="report-content">
              <div class="report-text">${escapeHtml(text)}</div>
            </div>
          `;
        } else {
          content.innerHTML = `
            <div class="empty-state">
              <h3>该日期暂无日报</h3>
              <p>点击"重新生成"按钮来生成日报</p>
            </div>
          `;
        }
      } catch (error) {
        content.innerHTML = `
          <div class="empty-state">
            <h3>加载失败</h3>
            <p>${error.message}</p>
          </div>
        `;
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function regenerateReport() {
      if (!currentDate) return;

      const btn = document.getElementById('regenerateBtn');
      const originalText = btn.textContent;
      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span> 生成中...';

      try {
        const response = await fetch(`/api/reports/${currentDate}/generate?force=true`, {
          method: 'POST'
        });

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.error || '生成失败');
        }

        await fetchReports();
        await loadReport(currentDate);
      } catch (error) {
        alert(error.message);
      } finally {
        btn.disabled = false;
        btn.textContent = originalText;
      }
    }

    document.getElementById('regenerateBtn').addEventListener('click', regenerateReport);

    fetchReports();
  </script>
</body>
</html>
